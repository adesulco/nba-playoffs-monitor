<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F0E0C" />

    <!-- Title + meta description (Bahasa-first, English in og alt). -->
    <title>gibol.co — skor NBA playoff 2026 live, peluang juara, bracket, dan statistik</title>
    <meta
      name="description"
      content="Skor NBA playoff 2026 live, peluang juara Polymarket, bracket Ronde 1, win probability, play-by-play, shot chart, dan statistik pemain — dashboard gila bola untuk pecinta bola basket Indonesia."
    />
    <!-- v0.61.0 — `meta name="keywords"` removed (audit F-019). Google
         has not used the keywords meta since 2009; presence signaled an
         SEO maturity gap with no compensating benefit. -->
    <meta name="author" content="gibol.co" />

    <!-- Favicons — v0.59.9 / Brand v1.0 Pulse mark.
         SVG favicon is the authoritative version (the live amber pulse on ink);
         PNG fallbacks for browsers that don't support SVG icons (rare in 2026). -->
    <link rel="icon" type="image/svg+xml" href="/brand/gibol-favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon-64.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/brand/gibol-favicon.svg" color="#F59E0B" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- PWA — installable on Android/iOS/desktop. SW registered in src/lib/pwa.js -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Gibol" />

    <!-- Canonical, hreflang, OG, and Twitter are set per-route by React Helmet (src/components/SEO.jsx).
         Do NOT hardcode them here — duplicates create canonical conflicts that Google reports as
         "Redirect error" or "Duplicate without user-selected canonical". -->

    <!-- OG image default (same for all pages; Helmet overrides if needed) -->
    <meta property="og:image" content="https://www.gibol.co/og-image.png" />
    <meta property="og:locale" content="id_ID" />
    <!-- v0.61.0 — `og:locale:alternate` removed (audit F-005). Site
         ships Bahasa only; no `/en/` URL subtree exists, so signalling
         an English locale alternate was misleading to crawlers. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://www.gibol.co/og-image.png" />

    <!-- Robots directives (explicit) -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "gibol.co",
      "alternateName": "gibol",
      "url": "https://www.gibol.co",
      "logo": "https://www.gibol.co/gibol-logo-512.png",
      "description": "Dashboard olahraga Bahasa-first untuk NBA Playoffs 2026, Formula 1 2026, Liga Inggris 2025-26, FIFA World Cup 2026, dan BRI Liga 1 Indonesia. Dibangun buat pecinta bola basket dan sepak bola di Indonesia.",
      "foundingLocation": {
        "@type": "Place",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "ID"
        }
      }
    }
    </script>

    <!-- JSON-LD: WebSite with SearchAction.
         v0.61.0 — audit F-013: consolidated the duplicate WebSite/Organization
         pairs (prerender.mjs's HOME_WEBSITE + HOME_ORG were emitting a second
         set on the home route). Both schema types now live ONLY here; prerender
         emits BreadcrumbList for / but no longer re-emits WebSite/Organization.
         inLanguage tightened to `id-ID` only since the site is Bahasa-only. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "gibol.co",
      "alternateName": "gila bola",
      "url": "https://www.gibol.co",
      "inLanguage": "id-ID",
      "description": "Dashboard live untuk NBA Playoffs 2026 · Formula 1 2026 · Liga Inggris 2025-26 · FIFA World Cup 2026 · BRI Liga 1 Indonesia",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.gibol.co/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- v0.13.0 — NBA SportsEvent JSON-LD removed from index.html.
         Prior to v0.13.0 it landed on EVERY page (incl. F1/EPL/Tennis
         routes) which is misleading to crawlers. Per-route SportsEvent
         schemas are now emitted by each sport's adapter via prerender;
         the home page has its own WebSite/Organization (above) which
         is correct site-wide signal. -->

    <!-- Self-hosted fonts (v0.63.0 paper-grey design port).
         Space Grotesk (UI/display) + JetBrains Mono (data/numerals) live
         in /public/fonts/. @font-face rules live in src/index.css.
         We preload the woff2 files directly so the browser fetches at
         high priority before CSS parses — the real fix for audit
         PERF-001 (supersedes the v0.62.8 Google-Fonts CSS-preload
         interim). Each woff2 is a variable font covering weights
         400-700 from a single Latin-subset file. Inter Tight and
         Newsreader were dropped — paper-grey has no serif. -->
    <link rel="preload" href="/fonts/space-grotesk-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono-latin.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Google Analytics 4 (hardcoded in HTML so crawlers / GSC verification find it).
         v0.62.0 — audit F-001: GA4 now ships in CONSENT MODE V2 with all
         storage categories defaulting to DENIED. The script tag stays so
         Search Console can verify the property, but no measurement
         actually flows until the user clicks "Setujui" in our banner
         (src/components/ConsentBanner.jsx → src/lib/consent.js → the
         analytics gate in src/lib/analytics.js + a runtime
         gtag('consent', 'update', { analytics_storage: 'granted' })).
         wait_for_update=500 gives our CMP a 500 ms window to fire the
         update before GA4 sends the first hit, preventing a brief
         pre-consent flash. -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BLYNEMRZCE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      // Consent mode v2 — all categories denied by default. The CMP
      // flips analytics_storage to 'granted' on Setujui via a runtime
      // gtag('consent', 'update', ...) call.
      gtag('consent', 'default', {
        analytics_storage: 'denied',
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        functionality_storage: 'granted',
        security_storage: 'granted',
        wait_for_update: 500
      });
      gtag('config', 'G-BLYNEMRZCE', { send_page_view: false, anonymize_ip: true });
    </script>
  </head>
  <body>
    <!-- SEO content: rendered in HTML source for crawlers even before React hydrates. -->
    <noscript>
      <!-- v0.62.6 — audit UX-005: the noscript fallback (what non-JS
           crawlers see) still tagged F1 / Liga Inggris / Liga 1 as
           "(segera hadir)" long after they went live. Removed the
           false tags; FIFA World Cup keeps an ETA. NBA display string
           standardised to "NBA Playoffs" per UX-014. Liga 1 link
           points at the canonical /super-league-2025-26 slug. -->
      <div style="padding:20px;font-family:system-ui;max-width:720px;margin:40px auto;color:#E6EEF9;background:#0A1628;">
        <h1>gibol.co — Skor NBA Playoffs 2026 Live</h1>
        <p>Dashboard olahraga Bahasa-first untuk NBA Playoffs 2026, Formula 1 2026, Liga Inggris 2025-26, Super League Indonesia 2025-26, Tenis ATP/WTA 2026, dan Piala Dunia FIFA 2026. Aktifkan JavaScript untuk melihat dashboard penuh.</p>
        <ul>
          <li><a href="https://www.gibol.co/nba-playoff-2026">NBA Playoffs 2026 — skor live, peluang juara, bracket</a></li>
          <li><a href="https://www.gibol.co/formula-1-2026">Formula 1 2026 — jadwal balap, klasemen pembalap &amp; konstruktor</a></li>
          <li><a href="https://www.gibol.co/premier-league-2025-26">Liga Inggris 2025-26 — klasemen, jadwal, top skorer</a></li>
          <li><a href="https://www.gibol.co/super-league-2025-26">Super League Indonesia 2025-26 — klasemen, jadwal, hasil Liga 1</a></li>
          <li><a href="https://www.gibol.co/tennis">Tenis ATP &amp; WTA 2026 — peringkat, turnamen</a></li>
          <li><a href="https://www.gibol.co/fifa-world-cup-2026">Piala Dunia FIFA 2026 (mulai Juni 2026)</a></li>
        </ul>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
