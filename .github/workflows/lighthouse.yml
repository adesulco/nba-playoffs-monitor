name: Lighthouse CI

# Runs Lighthouse on mobile emulation against the production site on every
# push to main. Scores are posted as a workflow summary; we treat scores below
# the thresholds as warnings (not build failures) so we don't block shipping.

on:
  push:
      branches: [main]
        pull_request:
            branches: [main]
              schedule:
                  # Weekly Monday 00:00 UTC (07:00 WIB) — weekly perf baseline.
                      - cron: '0 0 * * 1'
                        workflow_dispatch:

                        jobs:
                          lighthouse:
                              name: Run Lighthouse CI
                                  runs-on: ubuntu-latest
                                      steps:
                                            - name: Checkout
                                                    uses: actions/checkout@v4

                                                          - name: Wait for Vercel deploy
                                                                  if: github.event_name == 'push'
                                                                          run: sleep 90

                                                                                - name: Run Lighthouse against production
                                                                                        uses: treosh/lighthouse-ci-action@v11
                                                                                                with:
                                                                                                          urls: |
                                                                                                                      https://www.gibol.co/
                                                                                                                                  https://www.gibol.co/nba-playoff-2026
                                                                                                                                              https://www.gibol.co/recap
                                                                                                                                                          https://www.gibol.co/nba-playoff-2026/thunder
                                                                                                                                                                      https://www.gibol.co/about
                                                                                                                                                                                configPath: ./.lighthouserc.json
                                                                                                                                                                                          uploadArtifacts: true
                                                                                                                                                                                                    temporaryPublicStorage: true
                                                                                                                                                                                                    
                                                                                                                                                                                                          - name: Comment PR with results
                                                                                                                                                                                                                  if: github.event_name == 'pull_request'
                                                                                                                                                                                                                          uses: actions/github-script@v7
                                                                                                                                                                                                                                  with:
                                                                                                                                                                                                                                            script: |
                                                                                                                                                                                                                                                        core.info('Lighthouse results uploaded to temporary public storage — see Lighthouse CI step log for URLs.');
                                                                                                                                                                                                                                                        
