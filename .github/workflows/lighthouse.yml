name: Lighthouse CI

# Runs Lighthouse on mobile emulation against the production site.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Run Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for Vercel deploy
        if: github.event_name == 'push'
        run: sleep 90

      - name: Run Lighthouse against production
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://www.gibol.co/
            https://www.gibol.co/nba-playoff-2026
            https://www.gibol.co/recap
            https://www.gibol.co/nba-playoff-2026/thunder
            https://www.gibol.co/about
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
