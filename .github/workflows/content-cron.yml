name: Content Engine - Cron

# Phase 1 ship #14. Generates Bahasa articles on a schedule + commits the
# JSON files back to the repo. Vercel auto-rebuilds from the commit.
#
# Articles land with `manual_review: true` per Phase 1 doctrine — they're
# committed as drafts. Editor still approves via /editor before they go
# public.
#
# Triggers: all schedule blocks are commented OUT initially. Enable
# per-cadence by uncommenting + pushing. Every job is also runnable
# via workflow_dispatch from the GitHub Actions UI for manual back-fill
# or smoke-testing.
#
# Secrets required (set in GitHub repo Settings → Secrets):
#   ANTHROPIC_API_KEY        Anthropic key (sk-ant-api03-...)
#   SUPABASE_URL             https://egzacjfbmgbcwhtvqixc.supabase.co
#   SUPABASE_ANON_KEY        Supabase anon JWT
#   SUPABASE_SERVICE_ROLE_KEY  Supabase service-role JWT (for /api/approve)
#   API_FOOTBALL_KEY         API-Football pro key (optional in Phase 0/1
#                            since the engine routes through the Vercel
#                            proxy when this is empty)
#
# The runner installs the content-engine package from packages/content-engine/
# then runs `python -m content_engine.scripts.discover <mode>`. Output JSON
# is committed back via git in the same workflow.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Discovery mode to run'
        required: true
        default: 'tennis-rankings'
        type: choice
        options:
          - football-previews
          - football-recaps
          - nba-previews
          - nba-recaps
          - f1-weekend
          - tennis-rankings
          - weekly-standings
          - all
      budget_usd:
        description: 'Daily budget cap in USD (overrides DAILY_BUDGET_USD env)'
        required: false
        default: '2.00'
        type: string

  # Schedules — graduate per-cadence as confidence grows. Cron times UTC.
  #
  # GitHub Actions: public repo = unlimited minutes. Each discovery run
  # ~1-3 min; most runs in the 30-min poll window are no-ops.
  #
  # COST CAP: every run hits the "Daily budget guard" step first. If
  # SUM(cost_usd) for today exceeds DAILY_BUDGET_USD (default 2.00),
  # the run aborts before spending tokens. Override per-workflow-run
  # with the budget_usd workflow_dispatch input.
  #
  # GRADUATION ORDER (uncomment a block after a week of stable runs):
  #
  schedule:
    # NBA recap polling — every 30 min during 02:00-08:00 UTC. NBA evening
    # tipoffs run ~00:00-05:00 UTC, finals whistle ~02:00-08:00 UTC. Catches
    # each recap within 30 min of game end.
    # 13 runs/day max, most no-op (no new finished games). Cost per
    # generated recap ~$0.04 (Sonnet). Worst case 6 games/night = $0.24/day.
    - cron: '*/30 2-8 * * *'
    #
    # Tennis weekly rankings — Monday 06:00 UTC. ~$0.01/week (Haiku).
    # - cron: '0 6 * * 1'
    #
    # Football preview — daily 06:00 UTC. ~$0.10-0.30/day on match days.
    # - cron: '0 6 * * *'
    #
    # Football recap polling — Sat+Sun 12:00-23:00 UTC every 30 min.
    # - cron: '*/30 12-23 * * 0,6'
    #
    # NBA preview — daily 00:00 + 04:00 UTC.
    # - cron: '0 0,4 * * *'
    #
    # F1 weekend — Thursday 12:00 UTC + Sunday 18:00 UTC.
    # - cron: '0 12 * * 4'
    # - cron: '0 18 * * 0'
    #
    # Football weekly standings — Monday 09:00 UTC.
    # - cron: '0 9 * * 1'

permissions:
  contents: write   # needs to commit + push the generated JSON files

concurrency:
  group: content-cron-${{ github.event.inputs.mode || github.event.schedule }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Need full history so the commit-and-push step at the end
          # has somewhere to push to.
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('packages/content-engine/pyproject.toml') }}

      - name: Install content-engine
        working-directory: packages/content-engine
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Determine mode
        id: mode
        run: |
          if [ -n "${{ github.event.inputs.mode }}" ]; then
            MODE="${{ github.event.inputs.mode }}"
          elif [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            MODE="football-previews"
          elif [ "${{ github.event.schedule }}" = "*/30 12-23 * * 0,6" ]; then
            MODE="football-recaps"
          elif [ "${{ github.event.schedule }}" = "0 0,4 * * *" ]; then
            MODE="nba-previews"
          elif [ "${{ github.event.schedule }}" = "*/30 2-8 * * *" ]; then
            MODE="nba-recaps"
          elif [ "${{ github.event.schedule }}" = "0 12 * * 4" ] || [ "${{ github.event.schedule }}" = "0 18 * * 0" ]; then
            MODE="f1-weekend"
          elif [ "${{ github.event.schedule }}" = "0 6 * * 1" ]; then
            MODE="tennis-rankings"
          elif [ "${{ github.event.schedule }}" = "0 9 * * 1" ]; then
            MODE="weekly-standings"
          else
            MODE="tennis-rankings"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Running mode: $MODE"

      - name: Daily budget guard
        id: budget
        env:
          BUDGET_USD: ${{ github.event.inputs.budget_usd || '2.00' }}
        run: |
          # Sum cost_usd from ce_cron_runs for today (UTC). If we're
          # already at-or-over budget, skip discovery entirely.
          # Per CLAUDE.md rule #11 — hard halt on cost cap, no silent
          # degrade.
          set -e
          TODAY=$(date -u +%Y-%m-%d)
          SPENT=$(python3 -c "
          import os, json, urllib.request, urllib.parse
          url = os.environ['SUPABASE_URL'].rstrip('/') + '/rest/v1/ce_cron_runs'
          q = urllib.parse.urlencode({
              'run_at': f'gte.{os.environ[\"TODAY\"]}T00:00:00Z',
              'select': 'cost_usd',
          })
          req = urllib.request.Request(
              url + '?' + q,
              headers={
                  'apikey': os.environ['SUPABASE_SERVICE_ROLE_KEY'],
                  'authorization': 'Bearer ' + os.environ['SUPABASE_SERVICE_ROLE_KEY'],
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  rows = json.loads(r.read())
              total = sum(float(row.get('cost_usd') or 0) for row in rows)
              print(f'{total:.4f}')
          except Exception as e:
              # If Supabase is unreachable, fail safe — don't block the
              # run, but log loudly. The audit row will still be written
              # post-run; cap is just bypassed for this one run.
              import sys
              print(f'0.0000', flush=True)
              print(f'WARN: budget query failed: {e}', file=sys.stderr)
          " TODAY=$TODAY)
          echo "Today (UTC=$TODAY) spend: \$${SPENT}"
          echo "Budget cap:               \$${BUDGET_USD}"
          OK=$(python3 -c "print('1' if float('$SPENT') < float('$BUDGET_USD') else '0')")
          if [ "$OK" = "1" ]; then
            echo "✓ Under budget — proceeding."
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "✗ Over budget — skipping this run."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          fi
          echo "spent=$SPENT" >> "$GITHUB_OUTPUT"
          echo "cap=$BUDGET_USD" >> "$GITHUB_OUTPUT"

      - name: Run discovery
        id: discover
        if: steps.budget.outputs.ok == 'true'
        working-directory: packages/content-engine
        run: |
          mkdir -p /tmp/cmd-logs
          python -m content_engine.scripts.discover "${{ steps.mode.outputs.mode }}" 2>&1 | tee /tmp/cmd-logs/discover.log
          # Preserve exit code through the pipe
          exit ${PIPESTATUS[0]}

      - name: Capture generation failures to Supabase
        if: always() && steps.budget.outputs.ok == 'true'
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: |
          # Parse the discover log; surface every "✗" line + classify
          # the reason. Inserts a row in ce_generation_failures per
          # detected failure. Best-effort — never fails the workflow.
          set +e
          if [ ! -f /tmp/cmd-logs/discover.log ]; then echo "no log"; exit 0; fi
          python3 <<'PYEOF'
          import json, os, re, urllib.request

          with open('/tmp/cmd-logs/discover.log') as f:
              text = f.read()

          # Each ✗ line is a failure event. Cluster by surrounding
          # context (the agent= and game-id lines just above).
          fail_lines = [(i, ln) for i, ln in enumerate(text.splitlines()) if '✗' in ln]
          if not fail_lines:
              print("no failures detected in discover log")
              exit(0)

          REASON_PATTERNS = [
              (r'fact[_ -]?check.*failed', 'fact_check_fail'),
              (r'voice[_ -]?lint.*hard', 'voice_lint_fail'),
              (r'plagiarism.*fail|sim[_ -]?hash.*match', 'plagiarism_fail'),
          ]
          all_lines = text.splitlines()

          rows = []
          for i, ln in fail_lines:
              context = '\n'.join(all_lines[max(0, i-15):i+2])
              reason_type = 'unknown'
              for pat, label in REASON_PATTERNS:
                  if re.search(pat, context + ' ' + ln, re.IGNORECASE):
                      reason_type = label
                      break
              # extract command from context (first python -m content_engine. line above)
              cmd_match = re.search(r'(python -m content_engine\.[^\n]+)', context)
              cmd = cmd_match.group(1) if cmd_match else f'discover:{os.environ.get("MODE", "?")}'
              # extract agent + cost from context
              agent_match = re.search(r'agent=([a-z0-9-]+)', context)
              agent = agent_match.group(1) if agent_match else None
              costs = re.findall(r'cost_usd=([0-9.]+)', context)
              cost = sum(float(c) for c in costs[-3:]) if costs else 0.0  # last 3 to avoid double-counting older
              rows.append({
                  'command': cmd[:500],
                  'agent': agent,
                  'reason_type': reason_type,
                  'reason_summary': ln.strip()[:500],
                  'cost_usd': round(cost, 4),
                  'github_run_id': os.environ.get('GITHUB_RUN_ID'),
                  'github_run_url': f"https://github.com/adesulco/nba-playoffs-monitor/actions/runs/{os.environ.get('GITHUB_RUN_ID')}",
                  'details': {
                      'mode': os.environ.get('MODE'),
                      'log_context': context[-3000:],
                  },
              })

          url = os.environ['SUPABASE_URL'].rstrip('/') + '/rest/v1/ce_generation_failures'
          try:
              req = urllib.request.Request(
                  url, data=json.dumps(rows).encode('utf-8'), method='POST',
                  headers={
                      'apikey': os.environ['SUPABASE_SERVICE_ROLE_KEY'],
                      'authorization': 'Bearer ' + os.environ['SUPABASE_SERVICE_ROLE_KEY'],
                      'content-type': 'application/json',
                      'prefer': 'return=minimal',
                  },
              )
              with urllib.request.urlopen(req, timeout=10) as r:
                  print(f"logged {len(rows)} failure(s) (HTTP {r.status})")
          except Exception as e:
              print(f"WARN: failure-log insert failed: {e}")
          PYEOF

      - name: Compute cost from new content
        id: cost
        if: steps.budget.outputs.ok == 'true'
        run: |
          # Sum cost_usd from any JSON files in public/content/ that are
          # new or modified since checkout. Run BEFORE detect-new-content
          # since we need the file list either way.
          set -e
          git add -N public/content/ 2>/dev/null || true
          CHANGED=$(git diff --name-only -- public/content/ 2>/dev/null; \
                    git ls-files --others --exclude-standard -- public/content/)
          COUNT=0
          COST=$(python3 -c "
          import json, os, sys
          total = 0.0
          count = 0
          for line in os.environ.get('CHANGED', '').splitlines():
              line = line.strip()
              if not line.endswith('.json'):
                  continue
              try:
                  with open(line) as f:
                      d = json.load(f)
                  fm = d.get('frontmatter') or d
                  c = float(fm.get('cost_usd') or 0)
                  total += c
                  count += 1
              except Exception:
                  pass
          print(f'{total:.4f}|{count}')
          " CHANGED="$CHANGED")
          THIS_RUN_COST=$(echo "$COST" | cut -d'|' -f1)
          THIS_RUN_COUNT=$(echo "$COST" | cut -d'|' -f2)
          echo "cost_usd=$THIS_RUN_COST" >> "$GITHUB_OUTPUT"
          echo "articles_count=$THIS_RUN_COUNT" >> "$GITHUB_OUTPUT"
          echo "This run: $THIS_RUN_COUNT article(s), \$${THIS_RUN_COST}"

      - name: Detect new content
        id: changes
        if: steps.budget.outputs.ok == 'true'
        run: |
          if git diff --quiet --exit-code public/content/ 2>/dev/null && \
             [ -z "$(git ls-files --others --exclude-standard -- public/content/)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new content — exiting."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git status --short public/content/
          fi

      - name: Commit + push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name 'gibol-bot'
          git config user.email 'bot@gibol.co'
          git add public/content/
          git commit -m "feat(content): cron generated ${{ steps.mode.outputs.mode }} articles

Generated automatically by content-engine cron workflow.
All articles land with manual_review:true — editor approval via /editor required before public.

Co-Authored-By: gibol-bot <bot@gibol.co>"
          git push

      - name: Write audit row
        if: always()
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          BUDGET_OK: ${{ steps.budget.outputs.ok }}
          COST_USD: ${{ steps.cost.outputs.cost_usd || '0' }}
          ARTICLES_COUNT: ${{ steps.cost.outputs.articles_count || '0' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          TRIGGER: ${{ github.event_name }}
        run: |
          # Always-run audit row — even on budget skip / discovery failure
          # we want the timestamp + reason in the log. Service role bypass
          # RLS so this just works.
          set -e
          python3 <<'PYEOF'
          import os, json, urllib.request

          payload = {
              'mode': os.environ.get('MODE', 'unknown'),
              'trigger': 'workflow_dispatch' if os.environ.get('TRIGGER') == 'workflow_dispatch' else 'schedule',
              'articles_count': int(os.environ.get('ARTICLES_COUNT') or 0),
              'cost_usd': float(os.environ.get('COST_USD') or 0),
              'budget_skipped': os.environ.get('BUDGET_OK') != 'true',
              'github_run_id': os.environ.get('GITHUB_RUN_ID'),
              'github_run_url': f"https://github.com/adesulco/nba-playoffs-monitor/actions/runs/{os.environ.get('GITHUB_RUN_ID')}",
              'details': {
                  'budget_ok': os.environ.get('BUDGET_OK'),
              },
          }
          url = os.environ['SUPABASE_URL'].rstrip('/') + '/rest/v1/ce_cron_runs'
          req = urllib.request.Request(
              url,
              data=json.dumps(payload).encode('utf-8'),
              method='POST',
              headers={
                  'apikey': os.environ['SUPABASE_SERVICE_ROLE_KEY'],
                  'authorization': 'Bearer ' + os.environ['SUPABASE_SERVICE_ROLE_KEY'],
                  'content-type': 'application/json',
                  'prefer': 'return=minimal',
              },
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print(f"audit row inserted (HTTP {r.status})")
          except Exception as e:
              print(f"WARN: audit insert failed: {e}")
              # Don't fail the workflow — audit is observability, not
              # critical path.
          PYEOF

      - name: Summary
        if: always()
        run: |
          echo "Mode:        ${{ steps.mode.outputs.mode }}"
          echo "Trigger:     ${{ github.event_name }}"
          echo "Budget OK:   ${{ steps.budget.outputs.ok }}"
          echo "Spent today: \$${{ steps.budget.outputs.spent }} / \$${{ steps.budget.outputs.cap }}"
          echo "This run:    ${{ steps.cost.outputs.articles_count || 0 }} article(s), \$${{ steps.cost.outputs.cost_usd || 0 }}"
          echo "Pushed:      ${{ steps.changes.outputs.has_changes }}"
          if [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
            echo "Vercel rebuild triggered by the push."
            echo "Editor: https://www.gibol.co/editor"
          fi
