<?xml version="1.0" encoding="UTF-8"?>
<!--
  gibol.co logo — lowercase "g" letterform where the upper loop is a basketball.
  Colors:
    Background navy  #0c1a2e  (matches site dark theme)
    Cream letterform #efe8d4  (matches light-theme surface tones)
    Orange ball      #e8502e  (brand accent)
  Black segment lines on the basketball echo real-ball pattern.
  Designed for clarity at 32×32 (favicon) and up.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="gibol.co logo">
  <!-- Rounded-square navy background -->
  <rect width="512" height="512" rx="64" ry="64" fill="#0c1a2e"/>

  <!-- Cream descender of the "g" letterform.
       Vertical stroke from basketball down to hook, then curving left. -->
  <path
    d="M 312 210
       L 312 392
       Q 312 452 252 452
       Q 192 452 174 410"
    fill="none"
    stroke="#efe8d4"
    stroke-width="64"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Basketball — the upper loop of the "g" -->
  <circle cx="230" cy="210" r="128" fill="#e8502e"/>

  <!-- Basketball segment lines (dark, echoes real ball) -->
  <g stroke="#0c1a2e" stroke-width="6" fill="none" stroke-linecap="round">
    <!-- Horizontal equator -->
    <line x1="102" y1="210" x2="358" y2="210"/>
    <!-- Vertical meridian -->
    <line x1="230" y1="82" x2="230" y2="338"/>
    <!-- Left panel seam (curved) -->
    <path d="M 230 82 Q 162 210 230 338"/>
    <!-- Right panel seam (curved) -->
    <path d="M 230 82 Q 298 210 230 338"/>
  </g>
</svg>
